<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center center;
  background-size: cover;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  z-index:-1;
}

.container{
  padding:20px;
}

/* box */
.box{
  background: rgba(255,255,255,0.2);
  padding:15px;
  border-radius:12px;
  margin:15px 0;
}

/* input */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* button */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background: orange;
  color:white;
}

/* payment */
.pay{
  display:flex;
  gap:10px;
}

.pay div{
  flex:1;
  padding:10px;
  text-align:center;
  background: rgba(255,255,255,0.2);
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🛒 Confirm Order</h2>

<div class="box">
  <h3>🚀 Delivery Charges</h3>
  <p>0–2 km → ₹15</p>
  <p>2–5 km → ₹25</p>
  <p>5–8 km → ₹40</p>
</div>

<div class="box">
  <h3>💸 Small Order Fee लागू / Applied</h3>
  <p>Orders below ₹100 → +₹20</p>
  <p>₹100 se kam order → ₹20 extra</p>
</div>

<div class="box">
  <h3>📍 Enter Address</h3>
  <input id="address" placeholder="Enter your address">
</div>

<div class="box">
  <h3>💳 Select Payment</h3>
  <div class="pay">
    <div onclick="selectPay('COD')">Cash</div>
    <div onclick="selectPay('Online')">Online</div>
  </div>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

let payment = "COD";
let riders = ["Rider 1","Rider 2","Rider 3"];

function selectPay(p){
  payment = p;
  alert("Selected: " + p);
}

function placeOrder(){

  let address = document.getElementById("address").value;

  if(address==""){
    alert("Enter address");
    return;
  }

  let rider = riders[Math.floor(Math.random()*riders.length)];
  let time = Math.floor(Math.random()*20)+15;

  document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
      <h1>🎉 Order Placed</h1>
      <h2>${rider} is on the way 🚴</h2>
      <h3>${time} mins</h3>
      <p>${address}</p>
      <p>Payment: ${payment}</p>
    </div>
  `;
}

</script>

</body>
</html>
