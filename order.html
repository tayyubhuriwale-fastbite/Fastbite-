<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  background:black;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:orange;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* ITEM */
.item{
  display:flex;
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  border-radius:10px;
  margin-right:10px;
}

/* BOX */
.box{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin:15px 0;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#333;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#FF7A00;
  color:white;
  font-size:16px;
}

.total{
  color:orange;
  margin-top:10px;
}

/* REMOVE */
.removeBtn{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#FF7A00;
}

/* PAYMENT */
.payOption{
  display:flex;
  align-items:center;
  gap:10px;
  background:#333;
  padding:10px;
  border-radius:10px;
  margin:10px 0;
}

.payOption input{
  accent-color:orange;
}

/* HISTORY */
#historyPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:300px;
  height:100%;
  background:black;
  border-left:2px solid orange;
  transition:0.3s;
  padding:15px;
  overflow:auto;
}

.backBtn{
  background:orange;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="goBack()">⬅</div>
  <div>🛒 Confirm Order</div>
  <div onclick="openHistory()">📜</div>
</div>

<div class="container">

<div id="items"></div>

<div class="box">
  <h3>📍 Delivery Details</h3>
  <input id="address" placeholder="Enter your address">
  <input id="phone" placeholder="Enter phone number">
</div>

<div class="box">
  <h3>🚀 Delivery Info</h3>
  <p>0–2 km → ₹20</p>
  <p>2–5 km → ₹30</p>
  <p>5–8 km → ₹40</p>
  <br>
  <p>Delivery charges will be confirmed on call</p>
  <p>Location ke hisaab se delivery charge final hoga</p>
</div>

<!-- PAYMENT -->
<div class="box">
  <h3>💳 Payment Method</h3>

  <label class="payOption">
    <input type="radio" name="payment" value="COD">
    💵 Cash on Delivery
  </label>

  <label class="payOption">
    <input type="radio" name="payment" value="Online">
    📱 Online Payment (UPI)
  </label>
</div>

<div class="box">
  <h3>💰 Bill</h3>
  
  <p style="color:orange; font-size:14px;">
⚠️ Minimum order ₹100. Below ₹100, ₹20 extra charge applies.
</p>
  
  <p id="itemTotal"></p>
  <p id="smallFee"></p>
  <p id="deliveryNote"></p>
  <div class="total" id="finalTotal"></div>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<!-- HISTORY -->
<div id="historyPanel">
  <button class="backBtn" onclick="closeHistory()">⬅ Back</button>
  <h2 style="color:orange;">History</h2>
  <div id="historyList"></div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showItems(){
let html="";
let total=0;

cart.forEach((item,i)=>{
  total+=item.price;

  html+=`
  <div class="item">
    <img src="${item.img}">
    <div style="flex:1">
      <h4>${item.name}</h4>
      <p>₹${item.price}</p>
    </div>
    <button class="removeBtn" onclick="removeItem(${i})">Remove</button>
  </div>`;
});

document.getElementById("items").innerHTML=html;

let fee = total<100 ? 20 : 0;

document.getElementById("itemTotal").innerText="Items: ₹"+total;
document.getElementById("smallFee").innerText="Small Fee: ₹"+fee;
document.getElementById("deliveryNote").innerText="Delivery charge will be confirmed on call";
document.getElementById("finalTotal").innerText="Total: ₹"+(total+fee);
}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
location.reload();
}

function placeOrder(){

let address=document.getElementById("address").value;
let phone=document.getElementById("phone").value;
let payment=document.querySelector('input[name="payment"]:checked')?.value;

if(!address || !phone || !payment || cart.length==0){
alert("Fill all details");
return;
}

let items="";
let total=0;

cart.forEach(i=>{
items+=`- ${i.name} ₹${i.price}%0A`;
total+=i.price;
});

let fee= total<100?20:0;
let final=total+fee;

let msg=`🛒 NEW ORDER (MyFoodApp)

Phone: ${phone}
Address: ${address}

Items:
${items}

Payment: ${payment}

Total: ₹${final}

Delivery: Confirm on call`;

let number="919529785348";

window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);

localStorage.removeItem("cart");

document.body.innerHTML=`<h1 style="text-align:center;padding:50px;">🎉 Order Placed</h1>`;
}

function openHistory(){
document.getElementById("historyPanel").style.right="0";
}

function closeHistory(){
document.getElementById("historyPanel").style.right="-100%";
}

function goBack(){
window.history.back();
}

showItems();

</script>

</body>
</html>
