<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  font-size:20px;
  background:black;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:orange;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* ITEM */
.item{
  display:flex;
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  border-radius:10px;
  margin-right:10px;
}

/* BOX */
.box{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin:15px 0;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#333;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#FF7A00;
  color:white;
  font-size:16px;
}

button:hover{
  background:#E65C00;
}

.total{
  font-size:18px;
  margin-top:10px;
  color:orange;
}

/* REMOVE BTN */
.removeBtn{
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#FF7A00;
  border-radius:6px;
}

/* HISTORY PANEL */
#historyPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:320px;
  height:100%;
  background:#000;
  border-left:2px solid orange;
  transition:0.3s;
  padding:15px;
  overflow-y:auto;
  z-index:999;
}

.historyItem{
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* BACK BUTTON */
.backBtn{
  background:orange;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div onclick="goBack()" style="cursor:pointer;">⬅</div>

  <div>🛒 Confirm Order</div>

  <!-- HISTORY ICON -->
  <div onclick="openHistory()" style="cursor:pointer; font-size:20px;">
    📜
  </div>

</div>

<div class="container">

<div id="items"></div>

<div class="box">
  <h3>📍 Delivery Details</h3>
  <input id="address" placeholder="Enter your address">
  <input id="phone" placeholder="Enter phone number">
</div>

<div class="box">
  <h3>🚀 Delivery Info</h3>
  <p>0–2 km → ₹20</p>
  <p>2–5 km → ₹30</p>
  <p>5–8 km → ₹40</p>
</div>
<div class="box">
  <h3>💳 Payment Method</h3>

  <label style="display:block; margin:10px 0;">
    <input type="radio" name="payment" value="COD">
    💵 Cash on Delivery
  </label>

  <label style="display:block; margin:10px 0;">
    <input type="radio" name="payment" value="Online">
    📱 Online Payment (UPI)
  </label>
</div>
<div class="box">
  <h3>💰 Bill</h3>
  <p id="itemTotal"></p>
  <p id="smallFee"></p>
  <div class="total" id="finalTotal"></div>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<!-- HISTORY PANEL -->
<div id="historyPanel">

  <button class="backBtn" onclick="closeHistory()">⬅ Back</button>

  <h2 style="color:orange;">History</h2>

  <div id="historyList"></div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SHOW ITEMS */
function showItems(){

let itemsHTML = "";
let itemTotal = 0;

cart.forEach((item, index) => {
  itemTotal += item.price;

  itemsHTML += `
    <div class="item">
      <img src="${item.img}">
      
      <div style="flex:1">
        <h4>${item.name}</h4>
        <p>₹${item.price}</p>
      </div>

      <button class="removeBtn" onclick="removeItem(${index})">
        Remove
      </button>
    </div>
  `;
});

document.getElementById("items").innerHTML = itemsHTML;

let smallFee = itemTotal < 100 ? 20 : 0;

document.getElementById("itemTotal").innerText = "Items: ₹" + itemTotal;
document.getElementById("smallFee").innerText = "Small Fee: ₹" + smallFee;
document.getElementById("finalTotal").innerText = "Total: ₹" + (itemTotal + smallFee);

}

/* REMOVE ITEM */
function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  location.reload();
}

/* SAVE HISTORY */
function saveHistory(order){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(order);
  localStorage.setItem("history", JSON.stringify(history));
}

/* PLACE ORDER */
function placeOrder(){

  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(address==""){ alert("Enter address"); return; }
  if(phone==""){ alert("Enter phone number"); return; }
  if(cart.length == 0){ alert("Cart is empty"); return; }

  // Payment type (COD / Online)
  let paymentType = document.querySelector('input[name="payment"]:checked')?.value;

  if(!paymentType){
    alert("Select payment method");
    return;
  }

  // Build items text
  let itemsText = "";
  let total = 0;

  cart.forEach(item=>{
    itemsText += `- ${item.name} ₹${item.price}%0A`;
    total += item.price;
  });

  let smallFee = total < 100 ? 20 : 0;
  let finalTotal = total + smallFee;

  // WhatsApp message (ADMIN SIDE)
  let message =
`🛒 NEW ORDER (MyFoodApp)

👤 Customer:
Phone: ${phone}
Address: ${address}

🍔 Items:
${itemsText}

💰 Payment: ${paymentType}

💵 Total: ₹${finalTotal}

🌐 Source: Website Order`;

  // Save history
  let order = {
    items: cart,
    address: address,
    phone: phone,
    payment: paymentType,
    total: finalTotal,
    time: new Date().toLocaleString()
  };

  let history = JSON.parse(localStorage.getItem("history")) || [];
  history.push(order);
  localStorage.setItem("history", JSON.stringify(history));

  // Clear cart
  localStorage.removeItem("cart");

  // Open WhatsApp (CHANGE NUMBER HERE)
  let whatsappNumber = "91XXXXXXXXXX"; // <-- apna number daal
  let url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");

  // USER SCREEN ONLY
  document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
      <h1>🎉 Order Placed</h1>
      <p style="color:orange;">We will contact you soon 📞</p>
    </div>
  `;
}

/* HISTORY OPEN */
function openHistory(){
  document.getElementById("historyPanel").style.right="0";

  let history = JSON.parse(localStorage.getItem("history")) || [];

  let html = "";

  history.reverse().forEach(h=>{
    html += `
      <div class="historyItem">
        <b style="color:orange;">${h.total}</b><br>
        ${h.address}<br>
        ${h.time}
      </div>
    `;
  });

  document.getElementById("historyList").innerHTML = html;
}

/* HISTORY CLOSE */
function closeHistory(){
  document.getElementById("historyPanel").style.right="-100%";
}

function goBack(){
  window.history.back();
}

showItems();

</script>

</body>
</html>
