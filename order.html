<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:black;
}

.container{
  padding:15px;
}

.item{
  display:flex;
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  border-radius:10px;
  margin-right:10px;
}

.box{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin:15px 0;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:16px;
}

.total{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Confirm Order</div>

<div class="container">

<!-- ITEMS -->
<div id="items"></div>

<!-- ADDRESS + PHONE -->
<div class="box">
  <h3>📍 Delivery Details</h3>
  <input id="address" placeholder="Enter your address">
  <input id="phone" placeholder="Enter phone number">
</div>

<!-- INFO -->
<div class="box">
  <h3>🚀 Delivery Info</h3>
  <div class="box">
  <h3>🚀 Delivery Info</h3>

  <p>📍 0–2 km → ₹20</p>
  <p>📍 2–5 km → ₹30</p>
  <p>📍 5–8 km → ₹40</p>

  <br>

  <p>Delivery charges will be confirmed on call</p>
  <p>Location ke hisaab se delivery charge final hoga</p>
</div>

<!-- BILL -->
<div class="box">
  <h3>💰 Bill</h3>
  <p id="itemTotal"></p>
  <p id="smallFee"></p>
  <p id="deliveryNote"></p>
  <div class="total" id="finalTotal"></div>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

/* GET CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SHOW ITEMS */
let itemsHTML = "";
let itemTotal = 0;

cart.forEach(item => {
  itemTotal += item.price;

  itemsHTML += `
    <div class="item">
      <img src="${item.img}">
      <div>
        <h4>${item.name}</h4>
        <p>₹${item.price}</p>
      </div>
    </div>
  `;
});

document.getElementById("items").innerHTML = itemsHTML;

/* SMALL ORDER */
let smallFee = itemTotal < 100 ? 20 : 0;

/* SHOW BILL */
document.getElementById("itemTotal").innerText = "Items: ₹" + itemTotal;
document.getElementById("smallFee").innerText = "Small Order Fee: ₹" + smallFee;
document.getElementById("deliveryNote").innerText = "Delivery charge will be confirmed on call";
document.getElementById("finalTotal").innerText = "Subtotal: ₹" + (itemTotal + smallFee);

/* PLACE ORDER */
function placeOrder(){

  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(address==""){
    alert("Enter address");
    return;
  }

  if(phone==""){
    alert("Enter phone number");
    return;
  }

  if(cart.length == 0){
    alert("Cart is empty");
    return;
  }

  localStorage.removeItem("cart");

  document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
      <h1>🎉 Order Placed</h1>
      <h3>We will call you to confirm delivery charges 📞</h3>
      <p>${address}</p>
      <p>📱 ${phone}</p>
      <p>Subtotal: ₹${itemTotal + smallFee}</p>
    </div>
  `;
}

</script>

</body>
</html>
