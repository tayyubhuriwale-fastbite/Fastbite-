<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:black;
}

/* container */
.container{
  padding:15px;
}

/* item */
.item{
  display:flex;
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  border-radius:10px;
  margin-right:10px;
}

/* box */
.box{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin:15px 0;
}

/* input */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* payment */
.pay{
  display:flex;
  gap:10px;
}

.pay div{
  flex:1;
  text-align:center;
  padding:10px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}

/* button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:16px;
}

/* total */
.total{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🛒 Your Order</div>

<div class="container">

<!-- items -->
<div id="items"></div>

<!-- address -->
<div class="box">
  <h3>📍 Address</h3>
  <input id="address" placeholder="Enter your address">
</div>

<!-- payment -->
<div class="box">
  <h3>💳 Payment</h3>
  <div class="pay">
    <div onclick="selectPay('COD')">Cash</div>
    <div onclick="selectPay('Online')">Online</div>
  </div>
</div>

<!-- charges -->
<div class="box">
  <h3>💰 Bill</h3>
  <p id="itemTotal"></p>
  <p id="delivery"></p>
  <p id="smallFee"></p>
  <div class="total" id="finalTotal"></div>
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

/* GET CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SHOW ITEMS */
let itemsHTML = "";
let itemTotal = 0;

cart.forEach(item => {
  itemTotal += item.price;

  itemsHTML += `
    <div class="item">
      <img src="${item.img}">
      <div>
        <h4>${item.name}</h4>
        <p>₹${item.price}</p>
      </div>
    </div>
  `;
});

document.getElementById("items").innerHTML = itemsHTML;

/* CHARGES */
let deliveryCharge = 20; // simple default
let smallFee = itemTotal < 100 ? 20 : 0;

let finalTotal = itemTotal + deliveryCharge + smallFee;

/* SHOW BILL */
document.getElementById("itemTotal").innerText = "Items: ₹" + itemTotal;
document.getElementById("delivery").innerText = "Delivery: ₹" + deliveryCharge;
document.getElementById("smallFee").innerText = "Small Order Fee: ₹" + smallFee;
document.getElementById("finalTotal").innerText = "Total: ₹" + finalTotal;

/* PAYMENT */
let payment = "COD";

function selectPay(p){
  payment = p;
  alert("Selected: " + p);
}

/* PLACE ORDER */
function placeOrder(){

  let address = document.getElementById("address").value;

  if(address==""){
    alert("Enter address");
    return;
  }

  if(cart.length == 0){
    alert("Cart is empty");
    return;
  }

  localStorage.removeItem("cart");

  document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
      <h1>🎉 Order Placed</h1>
      <h2>Delivery on the way 🚴</h2>
      <h3>Total: ₹${finalTotal}</h3>
      <p>${address}</p>
      <p>Payment: ${payment}</p>
    </div>
  `;
}

</script>

</body>
</html>
