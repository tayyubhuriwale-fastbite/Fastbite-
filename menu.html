<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:black;
  align-items:center;
}

.back{
  cursor:pointer;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* search */
.search{
  width:95%;
  padding:10px;
  margin:10px;
  border-radius:20px;
  border:none;
  background:orange;
  color:black;
}

/* grid */
#foodList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.food{
  background:#222;
  border-radius:10px;
  padding:10px;
  text-align:center;
  transition:0.2s;
}

.food:hover{
  transform:scale(1.05);
}

.food img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:orange;
  color:white;
}

/* bottom */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:orange;
  text-align:center;
  padding:10px;
  display:none;
}

/* popup */
#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:80%;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">⬅️</div>
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<input class="search" id="searchInput" placeholder="Search..." onkeyup="searchFood()">

<div id="foodList"></div>

<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<!-- popup -->
<div id="popup" onclick="closePopup()">
  <div class="popup-box" id="popupContent"></div>
</div>

<script>

let foods = [
  {name:"Pizza", price:199, res:"Dominos", img:"https://source.unsplash.com/200x200/?pizza"},
  {name:"Burger", price:149, res:"McDonalds", img:"https://source.unsplash.com/200x200/?burger"},
  {name:"Biryani", price:249, res:"Biryani House", img:"https://source.unsplash.com/200x200/?biryani"},
  {name:"Juice", price:120, res:"Juice Center", img:"https://source.unsplash.com/200x200/?juice"}
];

let cart = [];

function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food" onclick="showDetails(${i})">
      <img src="${f.img}">
      <h3>${f.name}</h3>
      <p>₹${f.price}</p>
      <button onclick="event.stopPropagation(); addItem(${i})">Add</button>
      <button onclick="event.stopPropagation(); goOrder()">Order</button>
    </div>
    `;
  });
  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

/* add */
function addItem(i){
  cart.push(foods[i]);
  updateCart();

  /* animation */
  document.getElementById("count").style.transform="scale(1.3)";
  setTimeout(()=>{document.getElementById("count").style.transform="scale(1)";},200);
}

/* update */
function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;

  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}

/* search */
function searchFood(){
  let val = document.getElementById("searchInput").value.toLowerCase();
  let filtered = foods.filter(f => f.name.toLowerCase().includes(val));
  loadFood(filtered);
}

/* navigation */
function goOrder(){
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

function goBack(){
  window.location.href = "index.html";
}

/* popup */
function showDetails(i){
  let f = foods[i];
  document.getElementById("popupContent").innerHTML = `
    <h2>${f.name}</h2>
    <img src="${f.img}" style="width:100%;border-radius:10px;">
    <p>₹${f.price}</p>
    <p>${f.res}</p>
    <button onclick="addItem(${i})">Add</button>
    <button onclick="goOrder()">Order</button>
  `;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
