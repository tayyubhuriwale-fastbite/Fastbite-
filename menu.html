<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: url('https://picsum.photos/800/1200?food') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.cart{
  background: orange;
  padding:8px 15px;
  border-radius:20px;
}

/* search */
.search-box{
  width:90%;
  margin:10px auto;
  position:relative;
}

.search{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* suggestions */
.suggestions{
  position:absolute;
  width:100%;
  background:white;
  color:black;
  border-radius:10px;
  display:none;
}

.suggestions div{
  padding:10px;
  display:flex;
  align-items:center;
  border-bottom:1px solid #ccc;
}

.suggestions img{
  width:40px;
  height:40px;
  margin-right:10px;
  border-radius:8px;
}

/* food */
.food{
  display:flex;
  background: rgba(255,255,255,0.15);
  margin:10px;
  padding:10px;
  border-radius:10px;
  align-items:center;
}

.food img{
  width:80px;
  height:80px;
  border-radius:10px;
  margin-right:10px;
}

.food-details{
  flex:1;
}

.food button{
  margin:3px;
  background: orange;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  color:white;
}

/* bottom */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background: orange;
  text-align:center;
  padding:12px;
  display:none;
}

</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">⬅</div>
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<!-- search -->
<div class="search-box">
  <input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
  <div class="suggestions" id="suggestions"></div>
</div>

<!-- food list -->
<div id="foodList">

<div class="food" data-name="pizza">
  <img src="https://picsum.photos/100?pizza">
  <div class="food-details">
    <h3>Pizza</h3>
    <p>₹199 ⭐4.5</p>
    <small>Restaurant 1</small>
  </div>
  <a href="order.html">
  <button>Order</button>
</a>
</div>

<div class="food" data-name="burger">
  <img src="https://picsum.photos/100?burger">
  <div class="food-details">
    <h3>Burger</h3>
    <p>₹149 ⭐4.3</p>
    <small>Restaurant 2</small>
  </div>
  <a href="order.html">
  <button>Order</button>
</a>
</div>

<div class="food" data-name="biryani">
  <img src="https://picsum.photos/100?biryani">
  <div class="food-details">
    <h3>Biryani</h3>
    <p>₹249 ⭐4.6</p>
    <small>Restaurant 3</small>
  </div>
  <a href="order.html">
  <button>Order</button>
</a>
</div>

</div>

<!-- bottom -->
<div class="cart" onclick="window.location.href='order.html'">
</div>

<script>

let count = 0;

function addItem(){
  count++;
  document.getElementById("count").innerText = count;
  document.getElementById("count2").innerText = count;
  document.getElementById("bottomBar").style.display = "block";
}

function goOrder(){
  window.location.href = "order.html";
}

/
