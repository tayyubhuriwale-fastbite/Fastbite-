<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:black;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* search */
.search-box{
  padding:10px;
}

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

.suggestions{
  background:white;
  color:black;
  border-radius:10px;
  margin-top:5px;
}

.suggestions div{
  padding:10px;
  display:flex;
  align-items:center;
  cursor:pointer;
}

.suggestions img{
  width:40px;
  margin-right:10px;
}

/* food */
.food{
  display:flex;
  margin:10px;
  padding:10px;
  background:#222;
  border-radius:10px;
  align-items:center;
}

.food img{
  width:80px;
  border-radius:10px;
  margin-right:10px;
}

.food-details{
  flex:1;
}

button{
  margin:3px;
  padding:6px 10px;
  border:none;
  background:orange;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* bottom */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:orange;
  text-align:center;
  padding:10px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<div class="search-box">
  <input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div id="foodList"></div>

<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<script>

/* FOOD DATA */
let foods = [
  {name:"Pizza", price:199, rating:4.5, res:"Restaurant 1", img:"https://images.unsplash.com/photo-1601924582975-7d7f7d0b9c6b"},
  {name:"Burger", price:149, rating:4.3, res:"Restaurant 2", img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
  {name:"Biryani", price:249, rating:4.6, res:"Restaurant 3", img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOAD FOOD */
function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food">
      <img src="${f.img}">
      <div class="food-details">
        <h3>${f.name}</h3>
        <p>₹${f.price} ⭐${f.rating}</p>
        <small>${f.res}</small>
      </div>
      <button onclick="addItem(${i})">Add</button>
      <button onclick="goOrder()">Order</button>
    </div>
    `;
  });
  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

/* ADD TO CART */
function addItem(i){
  cart.push(foods[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;
  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}
updateCart();

/* SEARCH */
function searchFood(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let filtered = foods.filter(f => f.name.toLowerCase().includes(input));
  loadFood(filtered);

  let sug="";
  filtered.forEach(f=>{
    sug+=`
      <div onclick="selectFood('${f.name}')">
        <img src="${f.img}"> ${f.name}
      </div>
    `;
  });

  document.getElementById("suggestions").innerHTML = sug;
}

/* SELECT SUGGESTION */
function selectFood(name){
  document.getElementById("searchInput").value = name;
  searchFood();
}

/* GO ORDER */
function goOrder(){
  window.location.href="order.html";
}

</script>

</body>
</html>
