<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:black;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* search */
.search-box{
  padding:10px;
}

.search{
  width:95%;
  padding:8px;
  border-radius:20px;
  border:none;
  font-size:14px;
}

/* suggestions */
.suggestions{
  background:white;
  color:black;
  border-radius:10px;
  margin-top:5px;
}

.suggestions div{
  display:flex;
  padding:8px;
  align-items:center;
  cursor:pointer;
}

.suggestions img{
  width:40px;
  margin-right:10px;
}

/* categories */
.categories{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.categories button{
  background:#222;
  border-radius:20px;
  padding:8px 12px;
  color:white;
  border:none;
}

/* food grid */
#foodList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.food{
  background:#222;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.food img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin-top:5px;
  padding:6px 10px;
  border:none;
  background:orange;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* bottom cart */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  text-align:center;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<!-- search -->
<div class="search-box">
  <input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
  <div id="suggestions" class="suggestions"></div>
</div>

<!-- categories -->
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('sweets')">🍰 Sweets</button>
  <button onclick="filterCategory('drinks')">🥤 Drinks</button>
  <button onclick="filterCategory('biryani')">🍛 Biryani</button>
</div>

<!-- food -->
<div id="foodList"></div>

<!-- bottom cart -->
<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<script>

/* FOOD DATA */
let foods = [
  {name:"Pizza", price:199, category:"sweets", res:"Dominos", img:"https://source.unsplash.com/200x200/?pizza"},
  {name:"Burger", price:149, category:"sweets", res:"McDonalds", img:"https://source.unsplash.com/200x200/?burger"},
  {name:"Biryani", price:249, category:"biryani", res:"Biryani House", img:"https://source.unsplash.com/200x200/?biryani"},
  {name:"Cola", price:99, category:"drinks", res:"Pepsi", img:"https://source.unsplash.com/200x200/?cola"},
  {name:"Cake", price:199, category:"sweets", res:"Sweet Shop", img:"https://source.unsplash.com/200x200/?cake"},
  {name:"Juice", price:120, category:"drinks", res:"Juice Center", img:"https://source.unsplash.com/200x200/?juice"}
];

let cart = [];

/* load food */
function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food">
      <img src="${f.img}">
      <h3>${f.name}</h3>
      <p>₹${f.price} ⭐4.5</p>
      <small>${f.res}</small><br>
      <button onclick="addItem(${i})">Add</button>
    </div>
    `;
  });
  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

/* add cart */
function addItem(i){
  cart.push(foods[i]);
  updateCart();
}

/* update cart */
function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;

  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}

/* go order page */
function goOrder(){
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

/* search */
function searchFood(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let filtered = foods.filter(f => f.name.toLowerCase().includes(input));

  loadFood(filtered);

  let sug = document.getElementById("suggestions");
  sug.innerHTML = "";

  filtered.slice(0,5).forEach(f=>{
    sug.innerHTML += `
      <div onclick="selectFood('${f.name}')">
        <img src="${f.img}">
        ${f.name}
      </div>
    `;
  });
}

function selectFood(name){
  document.getElementById("searchInput").value = name;
  document.getElementById("suggestions").innerHTML = "";
  searchFood();
}

/* category */
function filterCategory(cat){
  if(cat==="all"){
    loadFood(foods);
  } else {
    let filtered = foods.filter(f => f.category === cat);
    loadFood(filtered);
  }
}

</script>

</body>
</html>
