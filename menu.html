<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: url('https://picsum.photos/800/1200?food') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color:white;
}

/* dark overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-size:20px;
}

/* cart */
.cart{
  background: orange;
  padding:8px 15px;
  border-radius:20px;
}

/* banner */
.banner{
  padding:15px;
}

.banner h2{
  margin:0;
}

/* search */
.search{
  width:90%;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* food items */
.food{
  display:flex;
  background: rgba(255,255,255,0.15);
  margin:10px;
  border-radius:12px;
  padding:10px;
  align-items:center;
}

.food img{
  width:80px;
  height:80px;
  border-radius:10px;
  margin-right:10px;
}

.food-details{
  flex:1;
}

.food button{
  background: orange;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
}

/* bottom cart bar */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background: orange;
  text-align:center;
  padding:12px;
  display:none;
}

</style>
</head>

<body>

<!-- header -->
<div class="header">
  <div onclick="history.back()">⬅</div>
  <div>Restaurant 1 ⭐4.3</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<!-- banner -->
<div class="banner">
  <h2>Fast Delivery 🚀</h2>
</div>

<!-- search -->
<input class="search" placeholder="Search food...">

<!-- food list -->

<div class="food">
  <img src="https://picsum.photos/100?pizza">
  <div class="food-details">
    <h3>Pizza</h3>
    <p>₹199 ⭐4.5</p>
  </div>
  <button onclick="addItem()">Add</button>
  <button onclick="goOrder()">Order</button>
</div>

<div class="food">
  <img src="https://picsum.photos/100?burger">
  <div class="food-details">
    <h3>Burger</h3>
    <p>₹149 ⭐4.3</p>
  </div>
  <button onclick="addItem()">Add</button>
  <button onclick="goOrder()">Order</button>
</div>

<div class="food">
  <img src="https://picsum.photos/100?biryani">
  <div class="food-details">
    <h3>Biryani</h3>
    <p>₹249 ⭐4.6</p>
  </div>
  <button onclick="addItem()">Add</button>
  <button onclick="goOrder()">Order</button>
</div>

<!-- bottom cart -->
<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<script>

let count = 0;

function addItem(){
  count++;
  document.getElementById("count").innerText = count;
  document.getElementById("count2").innerText = count;
  document.getElementById("bottomBar").style.display = "block";
}

function goOrder(){
  window.location.href = "order.html";
}

</script>

</body>
</html>
