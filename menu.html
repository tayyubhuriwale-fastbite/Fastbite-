<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:black;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
}

.search-box{ padding:10px; }

.search{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

.food{
  display:flex;
  margin:10px;
  padding:10px;
  background:#222;
  border-radius:10px;
  align-items:center;
}

.food img{
  width:80px;
  border-radius:10px;
  margin-right:10px;
}

.food-details{ flex:1; }

button{
  margin:3px;
  padding:6px 10px;
  border:none;
  background:orange;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* bottom */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  text-align:center;
  padding:10px;
  display:none;
}

/* 🔥 HISTORY PANEL */
#historyPanel{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#000;
  transition:0.3s;
  padding:15px;
  overflow:auto;
  z-index:9999;
}
</style>
</head>

<body>

<div class="header">
  <div>Menu</div>
  <div onclick="openHistory()">📜</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<div class="search-box">
  <input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
</div>

<div id="foodList"></div>

<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<!-- 🔥 HISTORY PANEL -->
<div id="historyPanel">
  <h2>History</h2>
  <button onclick="closeHistory()">Close</button>
  <div id="historyList"></div>
</div>

<script>

/* RESET CART EVERY TIME PAGE LOAD */
localStorage.removeItem("cart");

/* FOOD DATA */
let foods = [
  {name:"Pizza", price:199, rating:4.5, res:"Restaurant 1", img:"https://picsum.photos/200"},
  {name:"Burger", price:149, rating:4.3, res:"Restaurant 2", img:"https://picsum.photos/201"},
  {name:"Biryani", price:249, rating:4.6, res:"Restaurant 3", img:"https://picsum.photos/202"}
];

let cart = [];

/* LOAD FOOD */
function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food">
      <img src="${f.img}">
      <div class="food-details">
        <h3>${f.name}</h3>
        <p>₹${f.price} ⭐${f.rating}</p>
        <small>${f.res}</small>
      </div>
      <button onclick="addItem(${i})">Add</button>
      <button onclick="goOrder()">Order</button>
    </div>
    `;
  });

  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

/* ADD TO CART */
function addItem(i){
  cart.push(foods[i]);
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;

  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}

/* 🔥 ORDER COMPLETE */
function goOrder(){

  if(cart.length === 0){
    alert("Cart empty ❌");
    return;
  }

  let history = JSON.parse(localStorage.getItem("history")) || [];

  history.push({
    items: cart,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history));

  cart = [];
  updateCart();

  alert("Order Placed ✅");
}

/* 🔍 SEARCH */
function searchFood(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let filtered = foods.filter(f => f.name.toLowerCase().includes(input));
  loadFood(filtered);
}

/* 🔥 HISTORY PANEL */
function openHistory(){
  document.getElementById("historyPanel").style.right="0";
  loadHistory();
}

function closeHistory(){
  document.getElementById("historyPanel").style.right="-100%";
}

function loadHistory(){
  let history = JSON.parse(localStorage.getItem("history")) || [];
  let box = document.getElementById("historyList");

  box.innerHTML="";

  history.forEach((order,i)=>{
    box.innerHTML+=`
      <div>
        <b>Order ${i+1}</b>
        <ul>
          ${order.items.map(it=>`<li>${it.name}</li>`).join("")}
        </ul>
      </div>
    `;
  });
}
</script>

</body>
</html>
