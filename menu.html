<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:black;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
}

/* SEARCH */
.search{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:20px;
  border:none;
  background:orange;
  color:black;
}

/* SUGGESTIONS */
.suggestions{
  background:white;
  color:black;
  border-radius:10px;
  margin:5px auto;
  width:90%;
}

.suggestions div{
  display:flex;
  align-items:center;
  padding:8px;
  gap:10px;
  border-bottom:1px solid #ddd;
}

.suggestions img{
  width:40px;
  height:40px;
  border-radius:8px;
}

/* CATEGORIES */
.categories{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.cat{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#222;
  padding:10px;
  border-radius:10px;
  width:70px;
  font-size:22px;
  cursor:pointer;
}

.cat span{
  font-size:12px;
  margin-top:5px;
}

/* GRID */
#foodList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.food{
  background:#222;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.food img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:orange;
  color:white;
}

/* CART BAR */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:orange;
  text-align:center;
  padding:10px;
  display:none;
}

/* POPUP */
#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:80%;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="goBack()">⬅️</div>
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<p style="text-align:center; color:orange; font-size:14px; margin:10px;">
⚠️ Minimum order ₹100. Below ₹100, ₹20 extra charge applies.
</p>

<input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
<div id="suggestions" class="suggestions"></div>

<!-- CATEGORIES -->
<div class="categories">

  <div class="cat" onclick="filterCategory('all')">
    🍽️
    <span>All</span>
  </div>

  <div class="cat" onclick="filterCategory('sweets')">
    🍰
    <span>Sweets</span>
  </div>

  <div class="cat" onclick="filterCategory('drinks')">
    🥤
    <span>Drinks</span>
  </div>

  <div class="cat" onclick="filterCategory('biryani')">
    🍛
    <span>Biryani</span>
  </div>

</div>

<div id="foodList"></div>

<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<div id="popup" onclick="closePopup()">
  <div class="popup-box" id="popupContent"></div>
</div>

<script>

let foods = [
  {name:"Pizza", price:199, category:"sweets", res:"Dominos", img:"https://source.unsplash.com/200x200/?pizza"},
  {name:"Burger", price:149, category:"sweets", res:"McDonalds", img:"https://source.unsplash.com/200x200/?burger"},
  {name:"Biryani", price:249, category:"biryani", res:"Biryani House", img:"https://source.unsplash.com/200x200/?biryani"},
  {name:"Cola", price:99, category:"drinks", res:"Pepsi", img:"https://source.unsplash.com/200x200/?cola"},
  {name:"Cake", price:199, category:"sweets", res:"Sweet Shop", img:"https://source.unsplash.com/200x200/?cake"},
  {name:"Juice", price:120, category:"drinks", res:"Juice Center", img:"https://source.unsplash.com/200x200/?juice"}
];

let cart =
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food" onclick="showDetails(${i})">
      <img src="${f.img}">
      <h3>${f.name}</h3>
      <p>₹${f.price}</p>
      <small>${f.res}</small>
      <button onclick="event.stopPropagation(); addItem(${i})">Add</button>
      <button onclick="event.stopPropagation(); directOrder('${f.name}', ${f.price}, '${f.img}')">Order</button>
    </div>
    `;
  });
  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

function addItem(i){
  cart.push(foods[i]);
  loadFood(foods);
updateCart();
}

function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;

  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}

function goOrder(){
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

function directOrder(name, price, img){
  let cart = [{name, price, img}];
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

/* SEARCH */
function searchFood(){
  let val = document.getElementById("searchInput").value.toLowerCase();
  let filtered = foods.filter(f => f.name.toLowerCase().includes(val));
  loadFood(filtered);

  let sug = document.getElementById("suggestions");
  sug.innerHTML = "";

  if(val==="") return;

  filtered.slice(0,5).forEach(f=>{
    sug.innerHTML += `
      <div onclick="selectFood('${f.name}')">
        <img src="${f.img}">
        <span>${f.name}</span>
      </div>
    `;
  });
}

function selectFood(name){
  document.getElementById("searchInput").value = name;
  document.getElementById("suggestions").innerHTML="";
  searchFood();
}

/* FILTER */
function filterCategory(cat){
  if(cat==="all"){
    loadFood(foods);
  } else {
    let filtered = foods.filter(f => f.category===cat);
    loadFood(filtered);
  }
}

function showDetails(i){
  let f = foods[i];
  document.getElementById("popupContent").innerHTML = `
    <h2>${f.name}</h2>
    <img src="${f.img}" style="width:100%;border-radius:10px;">
    <p>₹${f.price}</p>
    <p>${f.res}</p>
    <button onclick="addItem(${i})">Add</button>
    <button onclick="directOrder('${f.name}', ${f.price}, '${f.img}')">Order</button>
  `;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function goBack(){
  history.back();
}

</script>

</body>
</html>
