<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:black;
}

.cart{
  background:orange;
  padding:8px 15px;
  border-radius:20px;
}

.search-box{ padding:10px; }

.search{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
  background:orange;
  color:black;
}

.suggestions{
  background:white;
  color:black;
  border-radius:10px;
  margin-top:5px;
}

.suggestions div{
  display:flex;
  padding:8px;
  align-items:center;
}

.suggestions img{
  width:40px;
  margin-right:10px;
}

.categories{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.categories button{
  background:#222;
  color:white;
  border:none;
  border-radius:20px;
  padding:8px;
}

#foodList{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.food{
  background:#222;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.food img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

button{
  margin-top:5px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:orange;
  color:white;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:orange;
  text-align:center;
  padding:10px;
  display:none;
}

#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:80%;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="goBack()">⬅️</div>
  <div>Menu</div>
  <div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
</div>

<p style="text-align:center; color:orange; font-size:14px; margin:10px;">
⚠️ Minimum order ₹100. Below ₹100, ₹20 extra charge applies.
</p>

<div class="search-box">
  <input class="search" id="searchInput" placeholder="Search food..." onkeyup="searchFood()">
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('sweets')">🍰</button>
  <button onclick="filterCategory('drinks')">🥤</button>
  <button onclick="filterCategory('biryani')">🍛</button>
</div>

<div id="foodList"></div>

<div class="bottom" id="bottomBar" onclick="goOrder()">
  View Cart (<span id="count2">0</span>)
</div>

<div id="popup" onclick="closePopup()">
  <div class="popup-box" id="popupContent"></div>
</div>

<script>

let foods = [
  {name:"Pizza", price:199, category:"sweets", res:"Dominos", img:"https://source.unsplash.com/200x200/?pizza"},
  {name:"Burger", price:149, category:"sweets", res:"McDonalds", img:"https://source.unsplash.com/200x200/?burger"},
  {name:"Biryani", price:249, category:"biryani", res:"Biryani House", img:"https://source.unsplash.com/200x200/?biryani"},
  {name:"Cola", price:99, category:"drinks", res:"Pepsi", img:"https://source.unsplash.com/200x200/?cola"},
  {name:"Cake", price:199, category:"sweets", res:"Sweet Shop", img:"https://source.unsplash.com/200x200/?cake"},
  {name:"Juice", price:120, category:"drinks", res:"Juice Center", img:"https://source.unsplash.com/200x200/?juice"}
];

let cart = [];

function loadFood(list){
  let html="";
  list.forEach((f,i)=>{
    html+=`
    <div class="food" onclick="showDetails(${i})">
      <img src="${f.img}">
      <h3>${f.name}</h3>
      <p>₹${f.price}</p>
      <small>${f.res}</small>
      <button onclick="event.stopPropagation(); addItem(${i})">Add</button>
      <button onclick="event.stopPropagation(); directOrder('${f.name}', ${f.price}, '${f.img}')">Order</button>
    </div>
    `;
  });
  document.getElementById("foodList").innerHTML = html;
}
loadFood(foods);

function addItem(i){
  cart.push(foods[i]);
  updateCart();
}

function updateCart(){
  document.getElementById("count").innerText = cart.length;
  document.getElementById("count2").innerText = cart.length;

  if(cart.length>0){
    document.getElementById("bottomBar").style.display="block";
  }
}

function goOrder(){
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

function directOrder(name, price, img){
  let cart = [{
    name:name,
    price:price,
    img:img
  }];
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "order.html";
}

function showDetails(i){
  let f = foods[i];
  document.getElementById("popupContent").innerHTML = `
    <h2>${f.name}</h2>
    <img src="${f.img}" style="width:100%;border-radius:10px;">
    <p>₹${f.price}</p>
    <p>${f.res}</p>
    <button onclick="addItem(${i})">Add</button>
    <button onclick="directOrder('${f.name}', ${f.price}, '${f.img}')">Order</button>
  `;
  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

function goBack(){
  history.back();
}
</script>

</body>
</html>
