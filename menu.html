<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background: url('https://picsum.photos/800/1200?restaurant') center/cover no-repeat;
  color:white;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.back{
  font-size:20px;
}

.cart{
  background:white;
  color:black;
  padding:5px 10px;
  border-radius:20px;
}

/* BANNER */
.banner{
  padding:15px;
  background:rgba(255,255,255,0.2);
  margin:10px;
  border-radius:15px;
}

/* SEARCH */
.search{
  width:90%;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  border:none;
  display:block;
}

/* FOOD CARD */
.food{
  display:flex;
  background:linear-gradient(135deg, orange, #ff6600);
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.food img{
  width:90px;
  border-radius:10px;
}

.details{
  margin-left:10px;
}

/* BUTTON */
button{
  background:black;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

/* CART POP */
#popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  padding:10px;
  display:none;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="header">
  <div class="back" onclick="history.back()">⬅</div>
<div class="cart" onclick="goOrder()">🛒 <span id="count">0</span></div>
<!-- BANNER -->
<div class="banner">
  <h2>Restaurant 1</h2>
  <p>⭐ 4.5 | Fast Delivery | 30 mins</p>
</div>

<!-- SEARCH -->
<input class="search" placeholder="Search food...">

<!-- FOOD ITEMS -->

<div class="food">
  <img src="https://picsum.photos/100?pizza">
  <div class="details">
    <h3>Pizza</h3>
    <p>₹199 | ⭐4.3</p>
    <button onclick="addCart()">Add</button>
    <button>Order</button>
  </div>
</div>

<div class="food">
  <img src="https://picsum.photos/100?burger">
  <div class="details">
    <h3>Burger</h3>
    <p>₹149 | ⭐4.1</p>
    <button onclick="addCart()">Add</button>
    <a href="order.html">
  <button>Order</button>
</a>
  </div>
</div>

<div class="food">
  <img src="https://picsum.photos/100?biryani">
  <div class="details">
    <h3>Biryani</h3>
    <p>₹249 | ⭐4.5</p>
    <button onclick="addCart()">Add</button>
    <button>Order</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup">Added to Cart ✔</div>

<script>

let count=0;

function addCart(){
  count++;
  document.getElementById("count").innerText=count;

  let p=document.getElementById("popup");
  p.style.display="block";

  setTimeout(()=>{
    p.style.display="none";
  },1000);
}
function goOrder(){
  window.location.href = "order.html";
}
</script>

</body>
</html>
