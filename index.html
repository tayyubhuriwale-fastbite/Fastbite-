<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>

/* 🌄 Background */
body {
  margin: 0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color: white;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🔥 Splash Screen */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 250px;
  animation: zoom 1s ease;
}

@keyframes zoom {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 🌈 Heading */
header {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  padding: 20px;
  background: linear-gradient(90deg, red, orange, yellow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-family: cursive;
}

/* 🔍 Search bar */
.search {
  padding: 12px;
  width: 90%;
  margin: 10px auto;
  display: block;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(5px);
}

/* 📦 Cards */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.15);
  width: 90%;
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  color: white;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 10px rgba(255,165,0,0.5);
}

/* 🔘 Button */
button {
  background: linear-gradient(45deg, red, orange);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

</style>

<script>
function orderNow(item) {
  let number = "91XXXXXXXXXX"; // 👈 apna number daal
  let msg = "Hello FastBite! I want to order: " + item;
  let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
  window.open(url, '_blank');
}
</script>

</head>

<body>

<!-- 🔥 Splash Screen -->
<div id="splash">
  <img src="file_00000000342071faa4305e3bf046e775.png">
</div>

<header>Welcome to FastBite 🍔</header>

<input type="text" class="search" placeholder="Search food...">

<div class="container">

  <div class="card">
    <h3>Pizza 🍕</h3>
    <button onclick="orderNow('Pizza')">Order Now</button>
  </div>

  <div class="card">
    <h3>Burger 🍔</h3>
    <button onclick="orderNow('Burger')">Order Now</button>
  </div>

  <div class="card">
    <h3>Biryani 🍛</h3>
    <button onclick="orderNow('Biryani')">Order Now</button>
  </div>

</div>

<!-- 🔥 Splash Script -->
<script>
window.onload = function() {
  setTimeout(() => {
    let splash = document.getElementById("splash");
    splash.style.opacity = "0";
    splash.style.transition = "0.5s";
    setTimeout(() => {
      splash.style.display = "none";
    }, 500);
  }, 1000);
};
</script>

</body>
</html>
