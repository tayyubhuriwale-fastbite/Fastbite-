<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>

/* Background */
body {
  margin: 0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color: white;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 220px;
  animation: intro 1s ease;
}
#splash {
  animation: fadeOut 0.5s ease 1s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}
/* zoom + fade + slight bounce */
@keyframes intro {
  0% {
    transform: scale(0.5) rotate(-10deg);
    opacity: 0;
  }
  60% {
    transform: scale(1.1) rotate(5deg);
    opacity: 1;
  }
  100% {
    transform: scale(1) rotate(0);
  }
}

/* Header */
header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  font-weight: bold;
}

.logo {
  font-size: 30px;
}

/* Search */
.search {
  width: 90%;
  margin: 10px auto;
  padding: 12px;
  display: block;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Restaurants */
.restaurants {
  padding: 10px;
}

.res-card {
  background: rgba(255,255,255,0.2);
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(5px);
}

/* Speciality */
.offers {
  padding: 10px;
}

.offer-card {
  background: rgba(255,255,255,0.2);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  font-size: 18px;

  opacity: 0;
  transform: translateY(60px) scale(0.95);
  transition: all 0.7s ease;
}

.offer-card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

</style>

</head>

<body>

<!-- Splash -->
<div id="splash">
  <img src="file_00000000342071faa4305e3bf046e775.png">
</div>

<!-- Header -->
<header>
  <span class="logo">🧸</span>
  Welcome to FastBite
</header>

<!-- Search -->
<input class="search" placeholder="Search food...">

<!-- Restaurants -->
<div class="restaurants">
  <div class="res-card">Restaurant 1 ⭐4.5</div>
  <div class="res-card">Restaurant 2 ⭐4.3</div>
  <div class="res-card">Restaurant 3 ⭐4.6</div>
  <div class="res-card">Restaurant 4 ⭐4.4</div>
</div>

<!-- Speciality -->
<div class="offers">
  <div class="offer-card">🚀 Fast Delivery</div>
  <div class="offer-card">🍔 Fresh & Hot Food</div>
  <div class="offer-card">💸 Best Prices Guaranteed</div>
  <div class="offer-card">📍 Live Order Tracking</div>
</div>

<script>

window.onload = function() {

  // Splash hide
  setTimeout(() => {
  document.getElementById("splash").style.display = "none";
}, 1500);

  // Animation
  let cards = document.querySelectorAll(".offer-card");

  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("show");
    }, i * 400);
  });

};

</script>

</body>
</html>
