<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  background: url('IMG_20260422_094342.png') center/cover no-repeat;
}

/* header */
header{
  text-align:center;
  font-size:26px;
  padding:15px;
  background:linear-gradient(red,orange);
}

/* offers */
.offers{
  padding:10px;
  background: rgba(0,0,0,0.5);
  text-align:center;
}

/* restaurant row */
.row{
  display:flex;
  overflow-x:auto;
  padding:10px;
}
.rest{
  margin:10px;
  text-align:center;
}
.rest img{
  width:90px;
  height:90px;
  border-radius:50%;
}

/* food list */
.food{
  display:flex;
  background: rgba(0,0,0,0.6);
  margin:10px;
  border-radius:10px;
  padding:10px;
}

.food img{
  width:100px;
  border-radius:10px;
}

.details{
  margin-left:10px;
}

button{
  padding:8px;
  border:none;
  background:red;
  color:white;
  border-radius:6px;
  margin-top:5px;
}

input{
  width:80%;
  padding:10px;
  margin:10px;
}
</style>

</head>

<body>

<header>🍔 Welcome to FastBite</header>

<!-- OFFERS -->
<div class="offers">
  🔥 50% OFF on first order | Free Delivery 🚴
</div>

<!-- RESTAURANTS -->
<div class="row">
  <div class="rest"><img src="https://picsum.photos/100?1"><p>Pizza</p></div>
  <div class="rest"><img src="https://picsum.photos/100?2"><p>Burger</p></div>
  <div class="rest"><img src="https://picsum.photos/100?3"><p>Biryani</p></div>
</div>

<!-- FOOD ITEMS -->
<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Pizza 🍕</h3>
    <p>₹199</p>
    <p>⭐ 4.3</p>

    <button onclick="addCart('Pizza',199)">Add to Cart</button>
    <button onclick="orderNow('Pizza',199)">Order Now</button>
  </div>
</div>

<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Burger 🍔</h3>
    <p>₹149</p>
    <p>⭐ 4.1</p>

    <button onclick="addCart('Burger',149)">Add to Cart</button>
    <button onclick="orderNow('Burger',149)">Order Now</button>
  </div>
</div>

<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Biryani 🍛</h3>
    <p>₹249</p>
    <p>⭐ 4.5</p>

    <button onclick="addCart('Biryani',249)">Add to Cart</button>
    <button onclick="orderNow('Biryani',249)">Order Now</button>
  </div>
</div>

<!-- CART BUTTON -->
<button onclick="openCart()" style="margin:20px;">🛒 View Cart</button>

<script>

let cart=[];

function addCart(name,price){
  cart.push({name,price});
  alert(name+" added to cart");
}

function openCart(){
  if(cart.length==0){
    alert("Cart empty");
    return;
  }

  let list="";
  let total=0;

  cart.forEach(item=>{
    list+=`<p>${item.name} - ₹${item.price}</p>`;
    total+=item.price;
  });

  document.body.innerHTML=`
    <h1>🛒 Cart</h1>
    ${list}
    <h2>Total: ₹${total}</h2>

    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="confirmOrder('Cart Order',${total})">Place Order</button>
  `;
}

function orderNow(name,price){
  document.body.innerHTML=`
    <h2>${name}</h2>
    <p>₹${price}</p>

    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="confirmOrder('${name}',${price})">Place Order</button>
  `;
}

function confirmOrder(item,price){
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  if(phone==""||address==""){
    alert("Fill all details");
    return;
  }

  let rider="Rider "+Math.floor(Math.random()*5+1);
  let time=Math.floor(Math.random()*20)+15;

  document.body.innerHTML=`
    <h1>🎉 Order Placed</h1>
    <p>${item}</p>
    <p>Total: ₹${price}</p>
    <p>📞 ${phone}</p>
    <p>📍 ${address}</p>
    <h3>${rider} assigned</h3>
    <p>Delivery in ${time} mins</p>
  `;
}

</script>

</body>
</html>
