<!DOCTYPE html>
<html>
<head>
  <title>Food Order App</title>
  <style>
    body {
      font-family: Arial;
      padding: 10px;
    }

    .item {
      margin: 5px 0;
    }

    button {
      margin-left: 10px;
      padding: 5px;
      cursor: pointer;
    }

    #cart, #history {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #000;
    }

    .order-card {
      border: 1px solid gray;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <h2>🍔 Menu</h2>

  <!-- MENU ITEMS -->
  <div class="item">Pizza <button onclick="addToCart('Pizza')">Add</button></div>
  <div class="item">Burger <button onclick="addToCart('Burger')">Add</button></div>
  <div class="item">Fries <button onclick="addToCart('Fries')">Add</button></div>

  <hr>

  <h2>🛒 Cart</h2>
  <div id="cart"></div>

  <button onclick="completeOrder()">✅ Order Complete</button>

  <h2>📜 History</h2>
  <div id="history"></div>

<script>
  let cart = [];
  let history = [];

  function addToCart(item) {
    cart.push(item);
    renderCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
  }

  function completeOrder() {
    if (cart.length === 0) return;

    history.push({
      items: [...cart],
      time: new Date().toLocaleString()
    });

    cart = [];
    renderCart();
    renderHistory();
  }

  function renderCart() {
    const cartBox = document.getElementById("cart");
    cartBox.innerHTML = "";

    cart.forEach((item, i) => {
      cartBox.innerHTML += `
        <div>
          ${item}
          <button onclick="removeFromCart(${i})">❌ Remove</button>
        </div>
      `;
    });
  }

  function renderHistory() {
    const historyBox = document.getElementById("history");
    historyBox.innerHTML = "";

    history.forEach((order, i) => {
      historyBox.innerHTML += `
        <div class="order-card">
          <b>Order ${i + 1}</b><br>
          ${order.time}
          <ul>
            ${order.items.map(it => `<li>${it}</li>`).join("")}
          </ul>
        </div>
      `;
    });
  }
</script>

</body>
</html>
