<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  background: url('IMG_20260422_094342.png') center/cover no-repeat;
}

/* header */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

#cart{
  background:white;
  color:black;
  padding:5px 10px;
  border-radius:20px;
}

/* food */
.food{
  display:flex;
  background: rgba(0,0,0,0.6);
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.food img{
  width:100px;
  border-radius:10px;
}

.details{
  margin-left:10px;
}

button{
  padding:6px;
  border:none;
  background:red;
  color:white;
  border-radius:6px;
  margin-top:5px;
}

input{
  width:80%;
  padding:10px;
  margin:10px;
}
</style>

</head>

<body>

<header>
  <h2>🍔 FastBite</h2>
  <div id="cart">🛒 <span id="count">0</span></div>
</header>

<!-- FOOD ITEMS -->

<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Pizza</h3>
    <p>₹199 | ⭐4.3</p>
    <button onclick="addCart('Pizza',199)">Add</button>
  </div>
</div>

<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Burger</h3>
    <p>₹149 | ⭐4.1</p>
    <button onclick="addCart('Burger',149)">Add</button>
  </div>
</div>

<div class="food">
  <img src="IMG_20260422_094342.png">
  <div class="details">
    <h3>Biryani</h3>
    <p>₹249 | ⭐4.5</p>
    <button onclick="addCart('Biryani',249)">Add</button>
  </div>
</div>

<!-- ORDER SECTION -->
<div style="text-align:center;">
  <input id="phone" placeholder="Phone">
  <input id="address" placeholder="Address">
  <button onclick="placeOrder()">Place Order</button>
</div>

<script>

let cart=[];

function addCart(name,price){
  cart.push({name,price});
  document.getElementById("count").innerText=cart.length;
}

function placeOrder(){
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  if(phone==""||address==""){
    alert("Fill details");
    return;
  }

  let total=0;
  cart.forEach(i=> total+=i.price);

  document.body.innerHTML=`
    <h1 style="text-align:center;">🎉 Order Placed</h1>
    <p style="text-align:center;">Total ₹${total}</p>
    <p style="text-align:center;">📞 ${phone}</p>
    <p style="text-align:center;">📍 ${address}</p>
  `;
}

</script>

</body>
</html>
