<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food App</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center/cover;
  color:white;
}

/* header */
header {
  text-align:center;
  font-size:28px;
  padding:15px;
  background:linear-gradient(red,orange);
}

/* restaurant icons */
.row {
  display:flex;
  overflow-x:auto;
  padding:10px;
}
.rest {
  text-align:center;
  margin:10px;
}
.rest img {
  width:70px;
  border-radius:50%;
}

/* cards */
.card {
  background: rgba(255,255,255,0.2);
  margin:10px;
  padding:15px;
  border-radius:10px;
}

/* buttons */
button {
  background:red;
  color:white;
  border:none;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>

<script>

// 🏪 Restaurant open
function openRestaurant(name) {
  document.body.innerHTML = `
    <h1>${name}</h1>
    <p>⭐ 4.2 | ⏱ 25 mins</p>

    <div class="card" onclick="openItem('Pizza',199)">
      Pizza 🍕 - ₹199
    </div>

    <div class="card" onclick="openItem('Burger',149)">
      Burger 🍔 - ₹149
    </div>

    <div class="card" onclick="openItem('Biryani',249)">
      Biryani 🍛 - ₹249
    </div>
  `;
}

// 🍔 item detail
function openItem(name, price) {
  document.body.innerHTML = `
    <h2>${name}</h2>
    <p>Price: ₹${price}</p>
    <p>Delivery: 20-30 mins</p>

    <button onclick="orderPage('${name}',${price})">Order Now</button>
  `;
}

// 📦 order page
function orderPage(item, price) {
  document.body.innerHTML = `
    <h2>${item}</h2>
    <p>₹${price}</p>

    <input id="phone" placeholder="Enter phone number"><br><br>
    <input id="address" placeholder="Enter address"><br><br>

    <h3>Payment</h3>
    <button onclick="confirmOrder('${item}','COD')">Cash on Delivery</button>
    <button onclick="confirmOrder('${item}','Online')">Online</button>
  `;
}

// 🚴 final order
function confirmOrder(item, payment) {
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if(phone=="" || address==""){
    alert("Enter details");
    return;
  }

  let rider = "Rider " + Math.floor(Math.random()*5+1);
  let time = Math.floor(Math.random()*20)+15;

  document.body.innerHTML = `
    <h1>🎉 Order Placed</h1>
    <p>${item}</p>
    <p>Payment: ${payment}</p>
    <p>📞 Customer: ${phone}</p>
    <p>📍 ${address}</p>
    <h3>${rider} assigned</h3>
    <p>Delivery in ${time} mins</p>
  `;
}

</script>

</head>

<body>

<header>Welcome 🍔</header>

<!-- Restaurants -->
<div class="row">

  <div class="rest" onclick="openRestaurant('Spicy Hub')">
    <img src="https://via.placeholder.com/70">
    <p>Spicy</p>
  </div>

  <div class="rest" onclick="openRestaurant('Food Zone')">
    <img src="https://via.placeholder.com/70">
    <p>Zone</p>
  </div>

  <div class="rest" onclick="openRestaurant('Desi Kitchen')">
    <img src="https://via.placeholder.com/70">
    <p>Desi</p>
  </div>

  <div class="rest" onclick="openRestaurant('Quick Bites')">
    <img src="https://via.placeholder.com/70">
    <p>Bites</p>
  </div>

  <div class="rest" onclick="openRestaurant('Tandoor House')">
    <img src="https://via.placeholder.com/70">
    <p>Tandoor</p>
  </div>

</div>

</body>
</html>
