<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food App</title>

<style>

/* 🌄 Background */
body {
  margin: 0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color: white;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 220px;
  animation: zoom 1s ease;
}

@keyframes zoom {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* Header */
header {
  text-align: center;
  font-size: 30px;
  padding: 20px;
  font-weight: bold;
  background: linear-gradient(90deg, red, orange, yellow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Inputs */
.search {
  width: 90%;
  margin: 10px auto;
  padding: 12px;
  display: block;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Cards */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  width: 90%;
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
}

/* Button */
button {
  background: linear-gradient(45deg, red, orange);
  border: none;
  padding: 10px 15px;
  color: white;
  border-radius: 8px;
}

</style>

</head>

<body>

<!-- Splash -->
<div id="splash">
  <img src="file_00000000342071faa4305e3bf046e775.png">
</div>

<header>Welcome 🍔</header>

<input class="search" placeholder="Search food...">
<input id="address" class="search" placeholder="Enter your address...">

<div class="container">

  <div class="card">
    <h3>Pizza 🍕</h3>
    <p>₹199</p>
  </div>

  <div class="card">
    <h3>Burger 🍔</h3>
    <p>₹149</p>
  </div>

  <div class="card">
    <h3>Biryani 🍛</h3>
    <p>₹249</p>
  </div>

</div>

<button onclick="placeOrder()" style="margin:20px;">Place Order</button>

<script>

/* Splash hide */
window.onload = function() {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 1000);
};

/* Rider system */
let riders = ["Rider 1", "Rider 2", "Rider 3", "Rider 4"];

function placeOrder() {
  let address = document.getElementById("address").value;

  if(address === "") {
    alert("Enter address");
    return;
  }

  let rider = riders[Math.floor(Math.random() * riders.length)];
  let time = Math.floor(Math.random() * 20) + 15;

  document.body.innerHTML = `
    <div style="text-align:center; padding:50px;">
      <h1>🎉 Order Placed!</h1>
      <h2>${rider} is on the way 🚴</h2>
      <h3>Delivery in ${time} mins</h3>
      <p>${address}</p>
    </div>
  `;
}

</script>

</body>
</html>
