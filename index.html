<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery App</title>
<style>@media (max-width: 600px) {

  .container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 90%;
  }

  .search {
    width: 95%;
  }

  header {
    font-size: 18px;
  }

}
body {body {
  margin: 0;
  font-family: Arial;
  background: url('bg.jpg') no-repeat center center/cover;
  color: white;
}body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {header {
  background: transparent;
  font-size: 28px;
  font-weight: bold;
}
  background: #ff4d4d;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.search {
  padding: 10px;
  width: 90%;
  margin: 10px auto;
  display: block;
  font-size: 16px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 250px;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 5px gray;
}

.card:hover {
  transform: scale(1.03);
}

.menu {
  display: none;
  padding: 20px;
}

.menu-item {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #ff4d4d;
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>My Food App 🍔</header>

<input class="search" type="text" id="search" placeholder="Search restaurants..." onkeyup="filterRestaurants()">

<div id="home" class="container"></div>

<div id="menuPage" class="menu"></div>

<script>
const restaurants = [
  {
    name: "Pizza Hub",
    items: [
      {name:"Cheese Pizza", price:199},
      {name:"Veg Pizza", price:149}
    ]
  },
  {
    name: "Burger King Style",
    items: [
      {name:"Veg Burger", price:99},
      {name:"Cheese Burger", price:129}
    ]
  },
  {
    name: "Desi Tadka",
    items: [
      {name:"Dal Rice", price:80},
      {name:"Paneer Curry", price:180}
    ]
  }
];

let home = document.getElementById("home");
let menuPage = document.getElementById("menuPage");

function showRestaurants(data){
  home.innerHTML = "";
  data.forEach((r, i)=>{
    home.innerHTML += `
      <div class="card" onclick="openMenu(${i})">
        <h3>${r.name}</h3>
        <p>Click to view menu</p>
      </div>
    `;
  });
}

function openMenu(index){
  home.style.display = "none";
  menuPage.style.display = "block";

  let r = restaurants[index];
  menuPage.innerHTML = `<h2>${r.name} Menu</h2>`;

  r.items.forEach(item=>{
    menuPage.innerHTML += `
      <div class="menu-item">
        <span>${item.name} - ₹${item.price}</span>
        <button onclick="orderNow('${r.name}','${item.name}',${item.price})">
  Order Now
</button>
    `;
  });

  menuPage.innerHTML += `<br><button onclick="goBack()">⬅ Back</button>`;
}

function goBack(){
  menuPage.style.display = "none";
  home.style.display = "flex";
}

function filterRestaurants(){
  let value = document.getElementById("search").value.toLowerCase();
  let filtered = restaurants.filter(r => r.name.toLowerCase().includes(value));
  showRestaurants(filtered);
}

showRestaurants(restaurants);
</script>
<script>
function orderNow(restaurant, item, price) {
  let number = "91XXXXXXXXXX"; // apna WhatsApp number

  let msg = `Hello 👋
I want to place an order:

Restaurant: ${restaurant}
Item: ${item}
Price: ₹${price}

Please confirm my order.`;

  let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}
</script>
</body>
</html>
