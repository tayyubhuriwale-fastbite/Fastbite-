<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>

/* 🌄 Background */
body {
  margin: 0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color: white;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* Splash */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 220px;
  animation: zoom 1s ease;
}

@keyframes zoom {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* Header */
header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  font-weight: bold;
}

.logo {
  font-size: 30px;
  margin-right: 8px;
}

/* Inputs */
.search {
  width: 90%;
  margin: 10px auto;
  padding: 12px;
  display: block;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}

/* Stories */
.stories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.story {
  text-align: center;
  margin: 10px;
}

.story img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 2px solid orange;
}

/* Speciality cards */
.offers {
  padding: 10px;
}
.offer-card{
  background: rgba(255,255,255,0.2);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  font-size: 18px;

  opacity: 0;
  transform: translateY(60px) scale(0.9);

  animation: smoothUp 0.7s ease forwards;
}

/* animation */
@keyframes smoothUp{
  0%{
    opacity:0;
    transform: translateY(60px) scale(0.9);
  }
  60%{
    opacity:1;
    transform: translateY(-5px) scale(1.02);
  }
  100%{
    opacity:1;
    transform: translateY(0) scale(1);
  }
}

/* delay (one by one entry) */
.offer-card:nth-child(1){animation-delay:0.3s;}
.offer-card:nth-child(2){animation-delay:0.6s;}
.offer-card:nth-child(3){animation-delay:0.9s;}
.offer-card:nth-child(4){animation-delay:1.2s;}


.offer-card:nth-child(1){animation-delay:0.2s;}
.offer-card:nth-child(2){animation-delay:0.4s;}
.offer-card:nth-child(3){animation-delay:0.6s;}
.offer-card:nth-child(4){animation-delay:0.8s;}

</style>

</head>

<body>

<!-- Splash -->
<div id="splash">
  <img src="file_00000000342071faa4305e3bf046e775.png">
</div>

<!-- Header -->
<header>
  <span class="logo">🧸</span>
  Welcome to FastBite
</header>

<!-- Search -->
<input class="search" placeholder="Search food...">

<!-- Stories -->
<div class="stories">
  <div class="story">
    <img src="https://picsum.photos/100?1">
    <p>Pizza</p>
  </div>
  <div class="story">
    <img src="https://picsum.photos/100?2">
    <p>Burger</p>
  </div>
  <div class="story">
    <img src="https://picsum.photos/100?3">
    <p>Biryani</p>
  </div>
  <div class="story">
    <img src="https://picsum.photos/100?4">
    <p>Snacks</p>
  </div>
</div>

<!-- Speciality Section -->
<div class="offers">
  <div class="offer-card">🚀 Fast Delivery in 20 mins</div>
  <div class="offer-card">🍔 Fresh & Hot Food</div>
  <div class="offer-card">💸 Best Prices Guaranteed</div>
  <div class="offer-card">📍 Live Order Tracking</div>
</div>

<script>

/* Splash hide */
window.onload = function() {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 1000);
};

</script>

</body>
</html>
