<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>
<div id="splash">
  <img src="file_00000000342071faa4305e3bf046e775.png" alt="logo">
</div>
body {
  margin: 0;
  font-family: Arial;
  background: url('file_00000000342071faa4305e3bf046e775.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed; /* 🔥 ye important hai */
  min-height: 100vh;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* 🔥 Fancy heading */
header {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  padding: 20px;
  background: linear-gradient(90deg, red, orange, yellow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-family: cursive;
}

/* Search bar */
 
  .search {
  padding: 12px;
  width: 90%;
  margin: 10px auto;
  display: block;
  border-radius: 10px;
  border: none;
  font-size: 16px;

  background: rgba(255,255,255,0.2); /* transparent */
  color: white;
  backdrop-filter: blur(5px); /* glass effect */
}

/* Cards */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.15); /* transparent */
  width: 90%;
  margin: 10px;
  padding: 20px;
  border-radius: 15px;
  color: white;
  box-shadow: 0 0 10px rgba(255,165,0,0.5);

  backdrop-filter: blur(8px); /* 🔥 glass effect */
}

/* Button */
button {
  background: linear-gradient(45deg, red, orange);
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 8px;
}

/* Hover */
.card:hover {
  transform: scale(1.03);
}
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#splash img {
  width: 250px;
  animation: zoom 1s ease;
}

@keyframes zoom {
  0% {
    transform: scale(0.5);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
</style>

<script>
function orderNow(item) {
  let number = "919529785348"; // 👉 yaha apna number daal
  let msg = "Hello FastBite! I want to order: " + item;
  let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
  window.open(url, '_blank');
}
</script>

</head>

<body>

<header>Welcome to FastBite 🍔</header>

<input type="text" class="search" placeholder="Search restaurants...">

<div class="container">

  <div class="card">
    <h3>Pizza 🍕</h3>
    <button onclick="orderNow('Pizza')">Order Now</button>
  </div>

  <div class="card">
    <h3>Burger 🍔</h3>
    <button onclick="orderNow('Burger')">Order Now</button>
  </div>

  <div class="card">
    <h3>Biryani 🍛</h3>
    <button onclick="orderNow('Biryani')">Order Now</button>
  </div>

</div>
<script>
window.onload = function() {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 1000);
};
</script>
  
</body>
</html>
