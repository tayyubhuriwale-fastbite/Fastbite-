<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastBite</title>

<style>
body{
  margin:0;
  font-family: Arial;
  color:white;
  background-size: cover;
  background-position: center;
}

/* header */
header{
  text-align:center;
  font-size:26px;
  padding:15px;
  background:linear-gradient(red,orange);
}

/* restaurant row */
.row{
  display:flex;
  overflow-x:auto;
  padding:10px;
}

.rest{
  text-align:center;
  margin:10px;
}

.rest img{
  width:90px;
  height:90px;
  border-radius:50%;
}

/* cards */
.card{
  background: rgba(0,0,0,0.5);
  margin:10px;
  padding:15px;
  border-radius:10px;
}

/* inputs */
input{
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

/* button */
button{
  padding:10px;
  border:none;
  background:red;
  color:white;
  border-radius:8px;
  margin:10px;
}
</style>

</head>

<body>

<header>🍔 Welcome to FastBite</header>

<!-- HOME -->
<div id="home">

<div class="row">

  <div class="rest" onclick="openRestaurant('Pizza Hub')">
    <img src="https://picsum.photos/100?1">
    <p>Pizza</p>
  </div>

  <div class="rest" onclick="openRestaurant('Burger Town')">
    <img src="https://picsum.photos/100?2">
    <p>Burger</p>
  </div>

  <div class="rest" onclick="openRestaurant('Biryani House')">
    <img src="https://picsum.photos/100?3">
    <p>Biryani</p>
  </div>

  <div class="rest" onclick="openRestaurant('Tandoor Point')">
    <img src="https://picsum.photos/100?4">
    <p>Tandoor</p>
  </div>

</div>

</div>

<!-- RESTAURANT -->
<div id="restaurant" style="display:none;">
<button onclick="goBack()">⬅ Back</button>
<h2 id="resName"></h2>

<div class="card" onclick="openItem('Pizza',199)">🍕 Pizza - ₹199</div>
<div class="card" onclick="openItem('Burger',149)">🍔 Burger - ₹149</div>
<div class="card" onclick="openItem('Biryani',249)">🍛 Biryani - ₹249</div>

</div>

<!-- ITEM -->
<div id="item" style="display:none;">
<button onclick="goBack()">⬅ Back</button>

<h2 id="itemName"></h2>
<img src="IMG_20260422_094342.png" style="width:90%; border-radius:10px;">
<p id="itemPrice"></p>
<p>⏱ Delivery in 20-30 mins</p>

<button onclick="goOrder()">Order Now</button>
</div>

<!-- ORDER -->
<div id="order" style="display:none;">
<button onclick="goBack()">⬅ Back</button>

<input id="phone" placeholder="Enter Phone Number">
<input id="address" placeholder="Enter Address">

<h3>Payment</h3>
<button onclick="confirmOrder('COD')">Cash on Delivery</button>
<button onclick="confirmOrder('Online')">Online Payment</button>

</div>

<script>

let current="home";

function show(page){

  document.getElementById("home").style.display="none";
  document.getElementById("restaurant").style.display="none";
  document.getElementById("item").style.display="none";
  document.getElementById("order").style.display="none";

  document.getElementById(page).style.display="block";
  current=page;

  // backgrounds
  if(page=="home"){
    document.body.style.background="black";
  }
  else if(page=="restaurant"){
    document.body.style.background="url('IMG_20260422_094342.png') center/cover";
  }
  else if(page=="item"){
    document.body.style.background="url('IMG_20260422_094342.png') center/cover";
  }
  else{
    document.body.style.background="url('delivery-staff-ride-motorcycles-shopping-concept_1150-34879.jpg') center/cover";
  }
}

function openRestaurant(name){
  document.getElementById("resName").innerText=name;
  show("restaurant");
}

let selectedItem="";

function openItem(name,price){
  selectedItem=name;
  document.getElementById("itemName").innerText=name;
  document.getElementById("itemPrice").innerText="₹"+price;
  show("item");
}

function goOrder(){
  show("order");
}

function confirmOrder(payment){
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  if(phone==""||address==""){
    alert("Fill all details");
    return;
  }

  let rider="Rider "+Math.floor(Math.random()*5+1);
  let time=Math.floor(Math.random()*20)+15;

  document.body.innerHTML=`
    <h1 style="text-align:center;">🎉 Order Placed</h1>
    <p style="text-align:center;">${selectedItem}</p>
    <p style="text-align:center;">Payment: ${payment}</p>
    <p style="text-align:center;">📞 ${phone}</p>
    <p style="text-align:center;">📍 ${address}</p>
    <h3 style="text-align:center;">${rider} assigned</h3>
    <p style="text-align:center;">Delivery in ${time} mins</p>
  `;
}

function goBack(){
  if(current=="order") show("item");
  else if(current=="item") show("restaurant");
  else if(current=="restaurant") show("home");
}

show("home");

</script>

</body>
</html>
